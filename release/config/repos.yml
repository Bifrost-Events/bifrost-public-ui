repositories:
  public-ui:
    owner: Bifrost-Events
    repo: bifrost-public-ui
    localPath: .
    workflow: deploy-release.yml
    deployOrder: 2
    smokeMode: public-ui
  admin-core:
    owner: Bifrost-Events
    repo: bifrost-admin-core
    localPath: ../bifrost-admin-core
    workflow: deploy-release.yml
    deployOrder: 1
    smokeMode: admin-core
  homepage:
    owner: sjurivar
    repo: bifrost-homepage
    localPath: ../bifrost-homepage
    workflow: deploy-release.yml
    deployOrder: 3
    smokeMode: homepage
    deployEnvironments:
      - production
  arrangor-ui:
    owner: Bifrost-Events
    repo: bifrost-arrangor-ui
    localPath: ../bifrost-arrangor-ui
    workflow: deploy-release.yml
    deployOrder: 4
    smokeMode: arrangor-ui
  # Events er intern modul i admin-core (modules/events) — ikke eget deploy-repo.
  shared:
    owner: Bifrost-Events
    repo: bifrost-shared
    localPath: ../bifrost-shared
    trackOnly: true
