# Staging er lokalt quality-oppsett – ingen FTP-deploy i release-flyten.
# Se quality/README.md for .env.local-quality og npm run quality:local

localQuality:
  profile: local-quality
  qualityCommand: npm run quality:local
  description: Playwright mot lokalt oppsett (resetbar DB, ikke sky-staging)
  localApps:
    - jaktfeltcup
    - namdal
    - admin
    - arrangor-jaktfeltcup
    - arrangor-namdal
  localUrls:
    public-ui: http://jaktfeltcup.local
    admin-ui: http://admin.bifrost.local
    arrangor-jaktfeltcup: http://arrangor.jaktfeltcup.local
    arrangor-namdal: http://arrangor.namdal.jaktfeltkarusell.local
  manualVerifyNote: >-
    quality:local kjører public-ui, admin og begge arrangør-cup-portaler.
    Alle deler samme backend – API-endringer testes på tvers.

# Deploy-miljøer synket til GitHub Environments (kun test og production)
environments:
  test:
    githubEnvironment: test
    smokeRequired: true
    manualApprovalRequired: true
    appUrls:
      public-ui: https://test.jaktfeltcup.no
      backend: https://test.api.bifrostevents.no
      admin-ui: https://test.admin.bifrostevents.no
      arrangor-ui: https://test.arrangor.jaktfeltcup.no
      arrangor-jaktfeltcup: https://test.arrangor.jaktfeltcup.no
      arrangor-namdal: https://test.arrangor.namdal.jaktfeltkarusell.no
    ftpVars:
      - FTP_HOST
      - FTP_USERNAME
      - FTP_PATH
      - FTP_PORT
      - APP_URL
    ftpSecrets:
      - FTP_PASSWORD

  production:
    githubEnvironment: production
    smokeRequired: true
    manualApprovalRequired: true
    appUrls:
      public-ui: https://jaktfeltcup.no
      backend: https://api.bifrostevents.no
      admin-ui: https://admin.bifrostevents.no
      arrangor-ui: https://arrangor.jaktfeltcup.no
      arrangor-jaktfeltcup: https://arrangor.jaktfeltcup.no
      arrangor-namdal: https://arrangor.namdal.jaktfeltkarusell.no
      homepage: https://bifrostevents.no
    ftpVars:
      - FTP_HOST
      - FTP_USERNAME
      - FTP_PATH
      - FTP_PORT
      - APP_URL
    ftpSecrets:
      - FTP_PASSWORD
