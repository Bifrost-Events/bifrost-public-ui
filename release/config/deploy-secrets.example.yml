# Kopier til deploy-secrets.local.yml (gitignored). Fyll inn FTP_PASSWORD – committ aldri passord.
#
# Verdier hentet fra Deploy-Admin:
#   platformstandard/Deploy-Admin/config/platform_data.json
#   platformstandard/Deploy-Admin/config/deploy_data.json
#
# Synk til GitHub Environments (test / production):
#   npm run release:sync-secrets
#
# FTP_USERNAME = ProISP-konto uten _ftp-suffix (workflow legger til _ftp ved FTP, ikke ved SFTP).
# FTP_PROTOCOL = ftp (default) eller sftp (jaktfeltkarusell-kontoen).
# FTP_PATH     = webroot_base + / + r* + / + app_folder (som Deploy-Admin sync).
#
# Hosting-kontoer:
#   csj1wp95j_w1406434  – bifrostevents (backend, admin prod, homepage prod)
#   csj1wp95j_w1439551  – jaktfeltkarusell (public-ui test, delt r1439642)
#   csj1wp95j_w1415788  – jaktfeltcup (public-ui prod, r1415789)

repositories:
  bifrost-backend:
    environments:
      test:
        # deploy_data: stage=test, r1465208, bifrostbackend/
        # Legacy GH env: test_api_bifrostevents_no
        vars:
          FTP_HOST: ssh.csj1wp95j.service.one
          FTP_USERNAME: csj1wp95j_w1406434
          FTP_PATH: /customers/d/9/c/csj1wp95j/webroots/r1465208/bifrostbackend/
          FTP_PROTOCOL: ftp
          FTP_PORT: "21"
          APP_URL: https://test.api.bifrostevents.no
        secrets:
          FTP_PASSWORD: "SET_LOCALLY"
      production:
        # deploy_data: stage=prod, r1464762, bifrostbackend/
        # Legacy GH env: hjellum-no-api-bifrostevents
        vars:
          FTP_HOST: ssh.csj1wp95j.service.one
          FTP_USERNAME: csj1wp95j_w1406434
          FTP_PATH: /customers/d/9/c/csj1wp95j/webroots/r1464762/bifrostbackend/
          FTP_PORT: "21"
          APP_URL: https://api.bifrostevents.no
        secrets:
          FTP_PASSWORD: "SET_LOCALLY"

  bifrost-public-ui:
    environments:
      test:
        # deploy_data: jaktfeltcup.no + jaktfeltkarusell.no test → r1439642
        # Hosting: csj1wp95j_w1439551 – kun SFTP (SSH-brukernavn uten _ftp)
        vars:
          FTP_HOST: ssh.csj1wp95j.service.one
          FTP_USERNAME: csj1wp95j_w1439551
          FTP_PATH: /customers/d/9/c/csj1wp95j/webroots/r1439642/bifrostpublicui/
          FTP_PROTOCOL: sftp
          FTP_PORT: "22"
          APP_URL: https://test.jaktfeltcup.no
        secrets:
          FTP_PASSWORD: "SET_LOCALLY"
      production:
        # Ikke registrert i deploy_data for bifrost-public-ui ennå.
        # Forventet jaktfeltcup prod: r1415789 + bifrostpublicui/ (csj1wp95j_w1415788).
        # Verifiser app_folder i Deploy-Admin før første prod-deploy.
        vars:
          FTP_HOST: ssh.csj1wp95j.service.one
          FTP_USERNAME: csj1wp95j_w1415788
          FTP_PATH: /customers/d/9/c/csj1wp95j/webroots/r1415789/bifrostpublicui/
          FTP_PORT: "21"
          APP_URL: https://jaktfeltcup.no
        secrets:
          FTP_PASSWORD: "SET_LOCALLY"

  bifrost-admin-ui:
    environments:
      test:
        # Mangler i Deploy-Admin – opprett filområde/DNS for test.admin.* før bruk.
        # Fjern denne blokken eller fyll inn når test-miljø er klart.
        vars:
          FTP_HOST: ssh.csj1wp95j.service.one
          FTP_USERNAME: csj1wp95j_w1406434
          FTP_PATH: /customers/d/9/c/csj1wp95j/webroots/PLACEHOLDER_TEST_ADMIN/bifrostadminui/
          FTP_PORT: "21"
          APP_URL: https://test.admin.bifrostevents.no
        secrets:
          FTP_PASSWORD: "SET_LOCALLY"
      production:
        # deploy_data: r1464744, bifrostadminui/
        # Legacy GH env: hjellum-no-admin-bifrostevents
        vars:
          FTP_HOST: ssh.csj1wp95j.service.one
          FTP_USERNAME: csj1wp95j_w1406434
          FTP_PATH: /customers/d/9/c/csj1wp95j/webroots/r1464744/bifrostadminui/
          FTP_PORT: "21"
          APP_URL: https://admin.bifrostevents.no
        secrets:
          FTP_PASSWORD: "SET_LOCALLY"

  bifrost-homepage:
    environments:
      production:
        # deploy_data: sjurivar/bifrost-homepage, r1464777, bifrosthomepage/
        # Legacy GH env: hjellum-no-bifrostevents
        vars:
          FTP_HOST: ssh.csj1wp95j.service.one
          FTP_USERNAME: csj1wp95j_w1406434
          FTP_PATH: /customers/d/9/c/csj1wp95j/webroots/r1464777/bifrosthomepage/
          FTP_PORT: "21"
          APP_URL: https://bifrostevents.no
        secrets:
          FTP_PASSWORD: "SET_LOCALLY"

