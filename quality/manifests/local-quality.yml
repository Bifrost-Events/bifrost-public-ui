environment: local-quality
description: Lokal automatisk Playwright – smoke, domain og staging-flyter (bruker/deltaker, admin)
apps:
  - jaktfeltcup
  - namdal
  - admin
  - arrangor-jaktfeltcup
  - arrangor-namdal
timeouts:
  test: 60000
  expect: 10000
  action: 15000
  navigation: 30000
screenshots:
  onSuccess: true
  onFailure: true
console:
  failOnError: true
  failOnPageError: true
database:
  prepareBeforeRun: true
  expectedBackendDatabase: bifrost_quality_local
  dotenvFile: .env.local-quality
