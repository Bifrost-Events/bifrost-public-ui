name: Quality (Playwright)

on:
  workflow_dispatch:
    inputs:
      quality_env:
        description: Miljø (local-quality / test / staging / production)
        required: true
        default: staging
        type: choice
        options:
          - local-quality
          - test
          - staging
          - production
      quality_app:
        description: Cup (all / slatlem / jaktfeltcup / namdal)
        required: true
        default: all
        type: choice
        options:
          - all
          - slatlem
          - jaktfeltcup
          - namdal
      test_scope:
        description: Testomfang
        required: true
        default: full
        type: choice
        options:
          - full
          - smoke
  push:
    branches:
      - develop
    paths:
      - 'quality/**'
      - 'app/**'
      - 'routes/**'
      - 'config/**'
      - 'playwright.config.ts'
      - 'package.json'

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Playwright (${{ github.event_name == 'workflow_dispatch' && inputs.quality_env || 'staging' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      QUALITY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.quality_env || 'staging' }}
      QUALITY_APP: ${{ github.event_name == 'workflow_dispatch' && inputs.quality_app || 'all' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run quality tests
        run: |
          SCOPE="full"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SCOPE="${{ inputs.test_scope }}"
          fi
          if [ "$SCOPE" = "smoke" ] || [ "$QUALITY_ENV" = "production" ]; then
            npx playwright test quality/tests/smoke
          else
            npx playwright test
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report-${{ env.QUALITY_ENV }}-${{ env.QUALITY_APP }}
          path: |
            quality/reports/
          retention-days: 14
