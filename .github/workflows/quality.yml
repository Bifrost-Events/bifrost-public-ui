name: Quality (Playwright)

on:
  workflow_call:
    inputs:
      quality_env:
        description: Miljø (test / staging / production)
        required: true
        type: string
      quality_app:
        description: Cup (all / slatlem / jaktfeltcup / namdal)
        required: false
        default: all
        type: string
      test_scope:
        description: Testomfang (full / smoke)
        required: false
        default: full
        type: string
      skip_db_prepare:
        description: Hopp over staging-reset før tester (CI default true)
        required: false
        default: 'true'
        type: string
  workflow_dispatch:
    inputs:
      quality_env:
        description: Miljø (local-quality / test / staging / production)
        required: true
        default: staging
        type: choice
        options:
          - local-quality
          - test
          - staging
          - production
      quality_app:
        description: Cup (all / slatlem / jaktfeltcup / namdal)
        required: true
        default: all
        type: choice
        options:
          - all
          - slatlem
          - jaktfeltcup
          - namdal
      test_scope:
        description: Testomfang
        required: true
        default: full
        type: choice
        options:
          - full
          - smoke
      skip_db_prepare:
        description: Hopp over staging-reset før tester
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: quality-${{ github.workflow }}-${{ inputs.quality_env || github.event.inputs.quality_env || 'staging' }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Playwright (${{ inputs.quality_env || github.event.inputs.quality_env || 'staging' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      QUALITY_ENV: ${{ inputs.quality_env || github.event.inputs.quality_env }}
      QUALITY_APP: ${{ inputs.quality_app || github.event.inputs.quality_app || 'all' }}
      QUALITY_SKIP_DB_PREPARE: ${{ inputs.skip_db_prepare || github.event.inputs.skip_db_prepare || 'true' }}

    steps:
      - name: Checkout public-ui
        uses: actions/checkout@v5

      - name: Reset staging database via HTTPS deploy endpoint
        if: env.QUALITY_SKIP_DB_PREPARE != 'true' && env.QUALITY_ENV == 'staging'
        env:
          STAGING_RESET_URL: ${{ secrets.STAGING_RESET_URL }}
          STAGING_DEPLOY_SECRET: ${{ secrets.STAGING_DEPLOY_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${STAGING_RESET_URL:-}" ] || [ -z "${STAGING_DEPLOY_SECRET:-}" ]; then
            echo "::error::Sett repository secrets STAGING_RESET_URL og STAGING_DEPLOY_SECRET"
            exit 1
          fi
          echo "Kaller staging reset-endepunkt …"
          curl -fsS --http1.1 -X POST "${STAGING_RESET_URL}" \
            -H "Authorization: Bearer ${STAGING_DEPLOY_SECRET}" \
            -H "Accept: application/json"
          echo "QUALITY_SKIP_DB_PREPARE=true" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run quality tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
        run: |
          SCOPE="${{ inputs.test_scope || github.event.inputs.test_scope || 'full' }}"
          if [ "$SCOPE" = "smoke" ] || [ "$QUALITY_ENV" = "production" ]; then
            npx playwright test quality/tests/smoke
          else
            npx playwright test
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: quality-report-${{ env.QUALITY_ENV }}-${{ env.QUALITY_APP }}
          path: |
            quality/reports/
          retention-days: 14
