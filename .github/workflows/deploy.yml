# Deploy via Deploy-Admin (FTP).
# Konfigurer app_folder og GitHub Environment i Deploy-Admin før første deploy.
name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: Branch eller tag
        required: true
        default: main

jobs:
  deploy:
    uses: ./.github/workflows/deploy-admin-ftp-github-secrets.yml
    permissions:
      contents: read
      deployments: write
    with:
      ref: ${{ github.event.inputs.ref || github.ref_name }}
      manifest_path: deploy-manifest.json
      checkout_submodules: false
      composer_install: true
      environments: '["hjellum-no-bifrostevents-public"]'
    secrets: inherit
