# Reusable workflow – deploy med credentials fra GitHub Environment secrets.
# Kopiert fra bifrost-admin-ui.

name: Deploy via Deploy-Admin (GitHub secrets)

on:
  workflow_call:
    inputs:
      environments:
        description: 'JSON-array med environment-navn'
        required: false
        default: ''
        type: string
      api_base:
        description: Deploy-Admin API base URL
        required: false
        default: 'https://hjellum.net/deploy-admin/api'
        type: string
      ref:
        description: Git ref (branch or tag) to deploy
        required: false
        default: main
        type: string
      ref_type:
        description: branch eller tag
        required: false
        default: ''
        type: string
      manifest_path:
        description: Path to deploy manifest
        required: false
        default: deploy-manifest.json
        type: string
      submodule_path:
        description: Path to auth-module submodule folder (optional)
        required: false
        default: auth-module
        type: string
      checkout_submodules:
        description: Whether to init/update submodules
        required: false
        default: true
        type: boolean
      composer_install:
        description: Whether to run composer install
        required: false
        default: true
        type: boolean
      composer_ci_file:
        description: Use this file as composer.json in CI
        required: false
        default: ''
        type: string
    secrets:
      DEPLOY_ADMIN_APP_KEY:
        required: false
      DEPLOY_ADMIN_ADMIN_KEY:
        required: false
      PAT_TOKEN:
        required: false
      CALLER_GITHUB_TOKEN:
        required: false
      DEPLOY_ENVIRONMENTS:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.matrix }}
      skip_deploy: ${{ steps.targets.outputs.skip_deploy }}
      ftpExclude: ${{ steps.manifest.outputs.ftpExclude }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          submodules: false
          token: ${{ secrets.PAT_TOKEN || github.token }}
      - name: Install Composer dependencies
        if: ${{ inputs.composer_install }}
        run: |
          set -euo pipefail
          if [ ! -f "composer.json" ]; then exit 0; fi
          composer install --no-dev --optimize-autoloader --no-interaction
      - name: Determine deploy targets
        id: targets
        env:
          ENVIRONMENTS_JSON: ${{ inputs.environments }}
          DEPLOY_ENVIRONMENTS: ${{ secrets.DEPLOY_ENVIRONMENTS }}
        run: |
          set -euo pipefail
          command -v jq >/dev/null || (sudo apt-get update -qq && sudo apt-get install -y jq)
          ENVS="${ENVIRONMENTS_JSON:-${DEPLOY_ENVIRONMENTS:-}}"
          if [ -z "$ENVS" ]; then echo "::error::Sett environments input"; exit 1; fi
          MATRIX_JSON=$(echo "$ENVS" | jq -c 'if type == "array" then [.[] | if type == "string" then {environment: .} else . end] | {include: .} else error("environments må være JSON-array") end')
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
      - name: Prepare deployment package
        id: manifest
        env:
          MANIFEST: ${{ inputs.manifest_path }}
        run: |
          set -euo pipefail
          rm -rf deploy-package && mkdir -p deploy-package
          EXCLUDE_STR=$(jq -r '.ftpExclude[]? // empty' "$MANIFEST" | paste -sd '\n' -)
          {
            echo 'ftpExclude<<EOF'
            printf '%s\n' "$EXCLUDE_STR"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          FILTER_FILE=$(mktemp)
          echo "+ */" >> "$FILTER_FILE" && echo "+ /.htaccess" >> "$FILTER_FILE"
          jq -r '.include[]' "$MANIFEST" | while read -r pattern; do echo "+ ${pattern}" >> "$FILTER_FILE"; done
          jq -r '.exclude[]? // empty' "$MANIFEST" | while read -r pattern; do echo "- ${pattern}" >> "$FILTER_FILE"; done
          echo "- *" >> "$FILTER_FILE"
          rsync -a --delete --prune-empty-dirs --filter="merge $FILTER_FILE" ./ deploy-package/
          mkdir -p deploy-package/public
          [ -f public/.htaccess ] && cp public/.htaccess deploy-package/public/.htaccess
      - uses: actions/upload-artifact@v5
        with:
          name: deploy-package
          path: deploy-package/
  deploy:
    needs: build
    if: ${{ needs.build.outputs.skip_deploy != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build.outputs.targets) }}
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: deploy-package
          path: deploy-package/
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_PATH }}
          port: 21
          protocol: ftp
          local-dir: deploy-package/
          exclude: ${{ needs.build.outputs.ftpExclude }}
          dangerous-clean-slate: false
